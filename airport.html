<!DOCTYPE html>
<html>
<head>
    <title>Airport Pickup & Drop</title>

<style>
/* Page background */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    margin: 0;
    padding: 0;
}

/* Heading */
h2 {
    text-align: center;
    color: white;
    margin-top: 30px;
}

/* Form container */
form {
    background: #ffffff;
    max-width: 400px;
    margin: 40px auto;
    padding: 25px 30px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

/* Labels */
label {
    font-weight: bold;
    color: #333;
}

/* Input fields */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    transition: 0.3s;
}

/* Input focus effect */
input:focus, select:focus {
    border-color: #5b86e5;
    outline: none;
    box-shadow: 0 0 6px rgba(91, 134, 229, 0.5);
}

/* Submit button */
button {
    width: 100%;
    padding: 12px;
    background: #5b86e5;
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
button:hover {
    background: #36d1dc;
}
button[type="button"] {
    background: #28a745;
    margin-top: 5px;
    margin-bottom: 10px;
}

button[type="button"]:hover {
    background: #218838;
}

.hero {
  background-image: url('https://disabledgoimageslive.blob.core.windows.net/venues/0c2d0312-3d78-694a-8913-f942926dd053/c49b3915-03fc-1343-92b9-c37ebfd1bfcd.jpg');
  background-size: cover;
  background-position: center;
  padding: 80px 20px;
  color: white;
  text-align: center;
}
</style>

</head>

<body>
<div class="hero"> 
<h2>✈️ Airport Pickup & Drop</h2>

<form id="airportForm">

    <label>Name:</label>
    <input type="text" id="name" required>

    <label>Phone:</label>
    <input type="text" id="phone" required>

    <label>Service Type:</label>
    <select id="service" required>
        <option value="">Select</option>
        <option value="Pickup">Airport Pickup</option>
        <option value="Drop">Airport Drop</option>
    </select>

  <label>Pickup Location:</label><br>
<input type="text" id="pickup" required>
<button type="button" onclick="getLocation()">📍 Use Current Location</button><br><br>

    <label>Airport Name:</label>
    <input type="text" id="airport" placeholder="e.g. Bangalore Airport" required>

    <label>Date:</label>
    <input type="date" id="date" required>

    <label>Time:</label>
    <input type="time" id="time" required>

    <button type="submit">Submit</button>

</form>

<script>
document.getElementById("airportForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let service = document.getElementById("service").value;
    let pickup = document.getElementById("pickup").value;
    let airport = document.getElementById("airport").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;

    let message = `Airport ${service} Booking:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Pickup: ${pickup}%0A
Airport: ${airport}%0A
Date: ${date}%0A
Time: ${time}`;

    let whatsappNumber = "918618182400";

    let url = `https://wa.me/${whatsappNumber}?text=${message}`;

    window.open(url, "_blank");
});
</script>
<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
        alert("Geolocation is not supported by this browser.");
    }
}

function showPosition(position) {
    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    let locationText = `https://www.google.com/maps?q=${lat},${lon}`;
    
    document.getElementById("pickup").value = locationText;
}

function showError(error) {
    switch(error.code) {
        case error.PERMISSION_DENIED:
            alert("Location access denied. Please allow location.");
            break;
        case error.POSITION_UNAVAILABLE:
            alert("Location information unavailable.");
            break;
        case error.TIMEOUT:
            alert("Request timed out.");
            break;
        default:
            alert("An unknown error occurred.");
    }
}
</script>

</body>
</html>
