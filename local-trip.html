<!DOCTYPE html>
<html>
<head>
    <title>Local Trip Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<style>
/* Page background */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #36d1dc, #5b86e5);
    margin: 0;
    padding: 0;
}

/* Heading */
h2 {
    text-align: center;
    color: white;
    margin-top: 30px;
}

/* Form container */
form {
    background: #ffffff;
    max-width: 400px;
    margin: 40px auto;
    padding: 25px 30px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

/* Labels */
label {
    font-weight: bold;
    color: #333;
}

/* Input fields */
input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    transition: 0.3s;
}

/* Input focus effect */
input:focus {
    border-color: #5b86e5;
    outline: none;
    box-shadow: 0 0 6px rgba(91, 134, 229, 0.5);
}

/* Submit button */
button {
    width: 100%;
    padding: 12px;
    background: #5b86e5;
    color: white;
    border: none;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

/* Button hover */
button:hover {
    background: #36d1dc;
}
button[type="button"] {
    background: #28a745;
    margin-top: 5px;
    margin-bottom: 10px;
}

button[type="button"]:hover {
    background: #218838;
}

.hero {
  background-image: url('https://img.freepik.com/premium-vector/man-car-road-trip-bg-vector-illustration-flat-2_764382-92270.jpg');
  background-size: cover;
  background-position: center;
  padding: 80px 20px;
  color: white;
  text-align: center;
}
body {
    margin: 0;
    padding: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}.form-container {
    width: 90%;
    max-width: 400px;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
}@media (max-width: 768px) {

    body {
        font-size: 16px;
    }

    .form-container {
        width: 95%;
        margin-top: 20px;
        padding: 15px;
    }

    input, select, button {
        width: 100%;
        font-size: 16px;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 20px;
        text-align: center;
    }
}
</style>
<body>
    <div class="hero"> 
<h2>🚗 Local Trip Booking</h2>


<form id="tripForm">
    
    <label>Name:</label><br>
    <input type="text" id="name" required><br><br>

    <label>Phone:</label><br>
    <input type="text" id="phone" required><br><br>

<label>Pickup Location:</label><br>
<input type="text" id="pickup" required>
<button type="button" onclick="getLocation()">📍 Use Current Location</button><br><br>

    <label>Destination:</label><br>
    <input type="text" id="destination" required><br><br>

    <label>Date:</label><br>
    <input type="date" id="date" required><br><br>

    <button type="submit">Submit</button>
</form>

<script>
document.getElementById("tripForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let pickup = document.getElementById("pickup").value;
    let destination = document.getElementById("destination").value;
    let date = document.getElementById("date").value;

    let message = `Local Trip Booking:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Pickup: ${pickup}%0A
Destination: ${destination}%0A
Date: ${date}`;

    // Replace with your WhatApp number (with country code, no +)
    let whatsappNumber = "918618182400";

    let url = `https://wa.me/${whatsappNumber}?text=${message}`;

    window.open(url, "_blank");
});
</script>
<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
        alert("Geolocation is not supported by this browser.");
    }
}

function showPosition(position) {
    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    let locationText = `https://www.google.com/maps?q=${lat},${lon}`;
    
    document.getElementById("pickup").value = locationText;
}

function showError(error) {
    switch(error.code) {
        case error.PERMISSION_DENIED:
            alert("Location access denied. Please allow location.");
            break;
        case error.POSITION_UNAVAILABLE:
            alert("Location information unavailable.");
            break;
        case error.TIMEOUT:
            alert("Request timed out.");
            break;
        default:
            alert("An unknown error occurred.");
    }
}
</script>
</body>
</html>
